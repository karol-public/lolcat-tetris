<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lolcat Tetris</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <h1 class="meme-text">LOLCAT TETRIS</h1>
        <div id="top-bar" style="display:flex; justify-content: space-between; width: 300px; margin-bottom: 5px;">
            <div id="info-panel"
                style="display: flex; flex-direction: column; align-items: flex-start; justify-content: center;">
                <div class="meme-text" style="font-size:20px;">SCORE: <span id="score">0</span></div>
                <div class="meme-text" style="font-size:20px;">LEVEL: <span id="level">1</span></div>
            </div>
            <div id="next-piece-container" style="display: flex; flex-direction: column; align-items: center;">
                <div class="meme-text" style="font-size:14px;">NEXT</div>
                <canvas id="next-canvas" width="80" height="80"
                    style="background:#000; border:2px solid #fff; box-shadow:none;"></canvas>
            </div>
        </div>

        <div style="position: relative;">
            <canvas id="tetris-canvas" width="300" height="600"></canvas>
            <div id="pause-screen" class="hidden"
                style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; flex-direction:column; justify-content:center; align-items:center;">
                <h2 class="meme-text" style="font-size: 36px;">PAUSED</h2>
                <button id="resume-btn" class="meme-text" style="font-size:20px;">RESUME NAOO</button>
            </div>
            <div id="cat-popup" class="hidden"
                style="position:absolute; top:20%; left:50%; transform:translateX(-50%); z-index:20; pointer-events:none;">
                <img id="cat-popup-img" src=""
                    style="width:200px; border:4px solid white; border-radius:10px; box-shadow:0 0 20px #ff3366;">
            </div>
        </div>

        <button id="start-btn" class="meme-text">PLAY NAOO</button>
        <div id="game-over-screen" class="hidden">
            <h2 class="meme-text">OH NOES! DED!</h2>
            <button id="restart-btn" class="meme-text">TRY AGAINZ</button>
        </div>
    </div>

    <script src="tetris.js"></script>
    <script src="input.js"></script>
    <script src="audio.js"></script>
    <script src="main.js"></script>
</body>

</html>
