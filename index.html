<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lolcat Tetris</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <h1 class="meme-text">LOLCAT TETRIS</h1>
        <div id="top-bar">
            <div id="info-panel">
                <div class="meme-text">SCORE: <span id="score">0</span></div>
                <div class="meme-text">LEVEL: <span id="level">1</span></div>
            </div>
            <div id="next-piece-container">
                <div class="meme-text" style="font-size:14px;">NEXT</div>
                <canvas id="next-canvas" width="80" height="80"></canvas>
            </div>
        </div>

        <div id="board-container">
            <canvas id="tetris-canvas"></canvas>
            <div id="pause-screen" class="overlay hidden">
                <h2 class="meme-text">PAUSED</h2>
                <button id="resume-btn" class="meme-text">RESUME NAOO</button>
            </div>
            <div id="cat-popup" class="hidden">
                <img id="cat-popup-img" src="">
            </div>
        </div>

        <div id="controls-bar">
            <button id="start-btn" class="meme-text">PLAY NAOO</button>
            <button id="pause-btn" class="meme-text hidden">PAUSE</button>
        </div>

        <div id="game-over-screen" class="hidden">
            <h2 class="meme-text">OH NOES! DED!</h2>
            <button id="restart-btn" class="meme-text">TRY AGAINZ</button>
        </div>
    </div>

    <script src="tetris.js"></script>
    <script src="input.js"></script>
    <script src="audio.js"></script>
    <script src="main.js"></script>
</body>

</html>
