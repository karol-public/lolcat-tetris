<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lolcat Tetris</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <div id="top-bar">
            <!-- Stats & Title Column -->
            <div class="top-col align-left">
                <h1 class="meme-text compact-title">LOL TETRIS</h1>
                <div class="meme-text stat-text">SCORE: <span id="score">0</span></div>
                <div class="meme-text stat-text">LVL: <span id="level">1</span></div>
            </div>

            <!-- Next Piece Column -->
            <div class="top-col align-center">
                <div class="meme-text stat-text" style="margin-bottom:2px;">NEXT</div>
                <canvas id="next-canvas" width="50" height="50"></canvas>
            </div>

            <!-- Controls Column -->
            <div class="top-col align-right gap-sm">
                <button id="start-btn" class="meme-text small-action-btn">PLAY</button>
                <button id="pause-btn" class="meme-text small-action-btn hidden">PAUSE</button>
            </div>
        </div>

        <div id="board-container">
            <canvas id="tetris-canvas"></canvas>
            <div id="pause-screen" class="overlay hidden">
                <h2 class="meme-text">PAUSED</h2>
                <button id="resume-btn" class="meme-text">RESUME NAOO</button>
            </div>
            <div id="cat-popup" class="hidden">
                <img id="cat-popup-img" src="">
            </div>
        </div>



        <div id="game-over-screen" class="hidden">
            <h2 class="meme-text">OH NOES! DED!</h2>
            <button id="restart-btn" class="meme-text small-action-btn">TRY AGAINZ</button>
        </div>
    </div>

    <script src="tetris.js"></script>
    <script src="input.js"></script>
    <script src="audio.js"></script>
    <script src="main.js"></script>
</body>

</html>
